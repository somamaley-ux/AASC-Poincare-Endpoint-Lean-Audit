name: Poincare Endpoint Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    name: Lean audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true

      - name: Run Poincare endpoint audit
        shell: pwsh
        run: ./scripts/check-poincare-endpoint-audit.ps1
